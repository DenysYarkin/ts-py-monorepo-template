services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-username}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-main_db}
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-username} -d ${DB_NAME:-main_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DB_USERNAME: ${DB_USERNAME:-username}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-main_db}
      PYTHONUNBUFFERED: "1"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./apps/api:/workspace/apps/api
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    environment:
      MAIN_API_SERVICE_URL: http://api:8000
      NODE_ENV: development
    command: npm run frontend:dev --workspace=apps/frontend -- --hostname 0.0.0.0 --port 3000
    volumes:
      - ./apps/frontend:/workspace/apps/frontend
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
