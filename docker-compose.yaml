services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      # These map your .env variables to the Docker image specific variables
      POSTGRES_USER: ${DB_USERNAME:-username}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-maind_controllers}
    ports:
      # Maps localhost:5432 to container:5432
      - "${DB_PORT:-5432}:5432"
    volumes:
      # Persist data even if container is removed
      - postgres_data:/var/lib/postgresql/data
  backend:
    build: ./backend
    container_name: backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8001 --reload --app-dir /app
    environment:
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - DB_HOST=postgres_db
      - DB_PORT=5432
    ports:
      - "8001:8001"
    volumes:
      # Mount the entire repo into /app so top-level packages like `database` exist
      - ./:/app
    depends_on:
      - db
      - chroma_db

volumes:
  postgres_data:
